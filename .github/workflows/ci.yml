name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 is EOL; the toolchain (lint:circular) no longer runs on it.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build workspaces
        run: npm run build --workspaces --if-present

      - name: Run tests
        run: npm test

      - name: Type-tests (public API)
        run: npm run test:types

      - name: Package checks (publint + are-the-types-wrong)
        # Verifica sobre el tarball real que exports y tipos resuelven correctamente
        # para consumidores viejos y nuevos (node10, node16 CJS/ESM, bundler).
        run: npm run check:pack --workspaces --if-present

      - name: No circular imports
        run: npm run lint:circular

      - name: Monorepo consistency (sherif)
        run: npx sherif

      - name: Dead code (knip)
        # No bloqueante todavia: knip reporta exports internos (videoAdapter.js,
        # commentsDao.js, videosDao.js) que podrian ser API publica no re-exportada
        # limpiamente en un package CJS, no dead code confirmado - necesita
        # triage manual antes de promoverlo a bloqueante. Ver output en logs.
        run: npx knip || true

  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build --workspaces --if-present

      - name: Bundle-size budget
        run: npm run size
